services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wineapp
      POSTGRES_USER: wineapp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wineapp}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wineapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__DefaultConnection: "Host=db;Database=wineapp;Username=wineapp;Password=${POSTGRES_PASSWORD:-wineapp}"
      WineApi__ApiKey: ${WINEAPI_KEY:-}
      JwtSecret: ${JWT_SECRET}
      AdminKey: ${ADMIN_KEY}
    depends_on:
      db:
        condition: service_healthy

  client:
    build: ./client
    restart: unless-stopped
    ports:
      - "3333:80"
    depends_on:
      - server

volumes:
  postgres_data:
